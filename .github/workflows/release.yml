name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        default: "0.1.0"
      draft:
        description: "Create or update the release as a draft"
        type: boolean
        required: true
        default: true
      prerelease:
        description: "Mark the release as a prerelease"
        type: boolean
        required: true
        default: false

permissions:
  contents: write

jobs:
  windows-package:
    name: Build Windows package
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      SIGNING_CERT_BASE64: ${{ secrets.SPACEPILOT_SIGNING_CERT_BASE64 }}
      SIGNING_CERT_PASSWORD: ${{ secrets.SPACEPILOT_SIGNING_CERT_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}".TrimStart("v")
          } else {
            $version = "$env:GITHUB_REF_NAME".TrimStart("v")
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          $toolPath = Join-Path $env:USERPROFILE ".dotnet\tools"
          $toolExe = Join-Path $toolPath "wix.exe"
          $toolPath | Out-File -FilePath $env:GITHUB_PATH -Append
          if (-not (Test-Path $toolExe)) {
            dotnet tool install --global wix
          }
          & $toolExe --version

      - name: Import signing certificate
        if: ${{ env.SIGNING_CERT_BASE64 != '' && env.SIGNING_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:SIGNING_CERT_BASE64)
          $certPath = Join-Path $env:RUNNER_TEMP "spacepilot-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $password = ConvertTo-SecureString $env:SIGNING_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          "SPACEPILOT_SIGNING_CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore
        run: dotnet restore .\apps\windows\SpacePilot.sln

      - name: Build
        run: dotnet build .\apps\windows\SpacePilot.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test .\apps\windows\tests\SpacePilot.Tests\SpacePilot.Tests.csproj --configuration Release --no-build

      - name: Package Windows zip
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SPACEPILOT_SIGNING_CERT_THUMBPRINT)) {
            .\scripts\windows\package-spacepilot.ps1 -Configuration Release -Runtime win-x64 -Version $env:RELEASE_VERSION -SkipSigning
          } else {
            .\scripts\windows\package-spacepilot.ps1 -Configuration Release -Runtime win-x64 -Version $env:RELEASE_VERSION
          }

      - name: Package Windows installer zip
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SPACEPILOT_SIGNING_CERT_THUMBPRINT)) {
            .\scripts\windows\package-installer.ps1 -Configuration Release -Runtime win-x64 -Version $env:RELEASE_VERSION -SkipSigning
          } else {
            .\scripts\windows\package-installer.ps1 -Configuration Release -Runtime win-x64 -Version $env:RELEASE_VERSION
          }

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: artifacts/packages/*
          if-no-files-found: error

  macos-package:
    name: Build macOS package
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          version="${version#v}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Show Swift version
        run: swift --version

      - name: Build and package macOS app
        run: bash scripts/macos/build-app.sh

      - name: Build macOS DMG
        run: VERSION="$RELEASE_VERSION" SKIP_APP_BUILD=true bash scripts/macos/build-dmg.sh

      - name: Rename macOS release assets
        shell: bash
        run: |
          mkdir -p artifacts/release
          zip_path="artifacts/release/SpacePilot-${RELEASE_VERSION}-macOS.zip"
          dmg_path="artifacts/release/SpacePilot-${RELEASE_VERSION}-macOS.dmg"
          cp artifacts/macos/SpacePilot-macOS.zip "$zip_path"
          cp artifacts/macos/SpacePilot-${RELEASE_VERSION}-macOS.dmg "$dmg_path"
          (
            cd artifacts/release
            shasum -a 256 "SpacePilot-${RELEASE_VERSION}-macOS.zip" > "SpacePilot-${RELEASE_VERSION}-macOS.zip.sha256"
            shasum -a 256 "SpacePilot-${RELEASE_VERSION}-macOS.dmg" > "SpacePilot-${RELEASE_VERSION}-macOS.dmg.sha256"
          )

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: artifacts/release/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - windows-package
      - macos-package

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts/release
          merge-multiple: true

      - name: Set release metadata
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          version="${version#v}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version" >> "$GITHUB_ENV"

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          SpacePilot ${RELEASE_VERSION}

          Compiled packages:

          - Windows installer ZIP: \`SpacePilot-${RELEASE_VERSION}-win-x64-installer.zip\`
          - Windows portable ZIP: \`SpacePilot-${RELEASE_VERSION}-win-x64.zip\`
          - macOS DMG: \`SpacePilot-${RELEASE_VERSION}-macOS.dmg\`
          - macOS ZIP: \`SpacePilot-${RELEASE_VERSION}-macOS.zip\`

          Safety and signing notes:

          - Windows packages and installers are unsigned unless Authenticode signing secrets are configured.
          - macOS packages are ad-hoc signed for local testing unless Developer ID signing and notarization are added.
          - The DMG is the recommended macOS download for drag-and-drop installation.
          - Keep quarantine enabled until you are confident the cleanup result is safe to purge.
          EOF

      - name: Publish or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          draft_flag=""
          prerelease_flag=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.draft }}" == "true" ]]; then
            draft_flag="--draft"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.prerelease }}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "SpacePilot ${RELEASE_VERSION}" \
              --notes-file release-notes.md
            gh release upload "$RELEASE_TAG" artifacts/release/* --clobber
          else
            gh release create "$RELEASE_TAG" artifacts/release/* \
              --title "SpacePilot ${RELEASE_VERSION}" \
              --notes-file release-notes.md \
              --target "$GITHUB_SHA" \
              $draft_flag \
              $prerelease_flag
          fi
